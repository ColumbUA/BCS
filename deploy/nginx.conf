# =====================================================================
# Nginx конфіг — статичний фронтенд + проксі /api → backend:8001
# =====================================================================
server {
    listen 80;
    server_name _;
    server_tokens off;
    client_max_body_size 20m;
    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    # Стиснення
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml application/zip image/svg+xml;
    gzip_min_length 1024;

    # Кешування статичних ресурсів React
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Проксі /api/* → backend
    location /api/ {
        proxy_pass http://backend:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Завантаження великих ZIP/XML
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SPA — все інше віддаємо index.html (для React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # health-check
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
